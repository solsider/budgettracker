version: "3.9"

services:
  web:
    build: .
    container_name: budgettracker-web
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me}
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://budgettracker:budgettracker@db:5432/budgettracker}
      PORT: 8000
    depends_on:
      - db
    expose:
      - "8000"

  db:
    image: postgres:16-alpine
    container_name: budgettracker-db
    environment:
      POSTGRES_DB: budgettracker
      POSTGRES_USER: budgettracker
      POSTGRES_PASSWORD: budgettracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nginx:
    image: nginx:1.27-alpine
    container_name: budgettracker-nginx
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
